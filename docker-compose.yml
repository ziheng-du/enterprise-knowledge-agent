# =============================================================================
# docker compose：把「容器怎么跑起来」写成一份清单
#
# 生活比喻：不是只做一道菜，而是开一家店——
# 后厨（api）、仓库货架（volume）、门口门铃（ports）、配方保密柜（env_file）
# 全都写在这一份菜单里，新人执行 `docker compose up` 就能开张。
#
# 当前项目只有一个 Web/API 服务；企业里常见还会并列：
#   api + postgres + redis + nginx
# 学 Compose 的重点是：服务声明、端口、环境变量、数据卷，而不是堆很多服务。
# =============================================================================

# 显式指定项目名：目录名含中文时，Compose 可能推不出合法项目名
name: enterprise-knowledge-agent

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: enterprise-knowledge-agent:local
    container_name: eka-api
    ports:
      # 宿主机端口:容器内端口 —— 浏览器访问 http://localhost:8000
      - "8000:8000"
    env_file:
      # 密钥只放宿主机 .env，不要写进镜像、不要提交 Git
      - .env
    environment:
      # 运行期可写数据统一放到 data/runtime（命名卷持久化）
      # 相对路径相对于容器 WORKDIR=/app
      VECTOR_DB_DIR: data/runtime/vector_db
      SESSION_DB_PATH: data/runtime/sessions.db
      RAW_DOCS_DIR: data/raw_docs
      DOC_ACCESS_PATH: data/doc_access.json
      USERS_FILE: data/users.json
      # 国内拉 HuggingFace 模型慢时，可在 .env 里设 HF_ENDPOINT=https://hf-mirror.com
    volumes:
      # 命名卷：删容器不丢向量库 / 会话库
      - eka_runtime:/app/data/runtime
      # 模型缓存：避免每次新建容器都重新下载 Embedding 权重
      - eka_hf_cache:/home/appuser/.cache/huggingface
      # 说明：制度文档在 Dockerfile 里 COPY 进镜像。
      # 若项目路径含中文，Windows 绑定挂载 ./data 容易失败，故默认不用 bind mount。
      # 改文档后需要：重新 build，或把项目放到纯英文路径后再加挂载。
    restart: unless-stopped

volumes:
  eka_runtime:
  eka_hf_cache:
