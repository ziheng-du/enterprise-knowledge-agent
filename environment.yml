# Conda 环境定义 — 企业智能知识助手 (RAG + Agent)
# 创建: conda env create -f environment.yml
# 更新: conda env update -f environment.yml --prune
# 激活: conda activate enterprise-knowledge-agent

name: enterprise-knowledge-agent
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  - pip>=24.0
  - pip:
      - -r requirements.txt
